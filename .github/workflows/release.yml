name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: SSH Tools ${{ github.ref_name }}
          releaseBody: |
            Download **SSH Tools.dmg** below, open it, and drag the app to Applications.

            > First launch: right-click the app → Open (Gatekeeper unsigned app).
          releaseDraft: false
          prerelease: false
